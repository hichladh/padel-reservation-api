apiVersion: apps/v1
kind: Deployment

metadata:
  name: padel-api-deployment

spec:
  replicas: 1

  selector:
    matchLabels:
      app: padel-api

  template:
    metadata:
      labels:
        app: padel-api

    spec:
      containers:
        - name: padel-api
          image: padel-reservation-api:1
          imagePullPolicy: Never

          ports:
            - containerPort: 5000

---
apiVersion: v1
kind: Service

metadata:
  name: padel-api-service

spec:
  type: NodePort

  selector:
    app: padel-api

  ports:
    - port: 5000
      targetPort: 5000
      nodePort: 30081
